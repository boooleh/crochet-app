<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<!-- Status / browser bar colour. Must match the app-header background so the
     system bar blends into the UI instead of showing a mismatched stripe.
     Split by colour scheme so dark-mode devices get a proper dark bar too. -->
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Crochet Corner"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png"/>
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png"/>
<title>Crochet Corner</title>
<style>html,body{background:#ffffff;overscroll-behavior:none;}</style>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="shell">
  <div class="screens">

    <!-- Screen: Projects list -->
    <div class="screen on" id="s-projects">
      <div class="app-header">
        <div class="app-header-side">
          <button class="sb-avatar-btn" onclick="sbShowProfileSheet()" aria-label="Profile & settings">
            <span class="sb-avatar-initials">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </span>
            <span class="sb-avatar-dot"></span>
          </button>
        </div>
        <img src="CC-logo.png" alt="Crochet Corner" class="app-header-logo"/>
        <div class="app-header-side">
          <button class="btn-header-add" onclick="openNewProject()" title="New project">
            <svg viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
          </button>
        </div>
      </div>
      <div class="list-pad">
        <div style="padding:0.75rem 0 0.25rem">
          <span class="count-lbl" id="proj-count-lbl">0 projects</span>
        </div>
        <div class="filters">
          <input type="text" id="proj-search" placeholder="Search projects…" oninput="renderProjects()"/>
          <select id="proj-status-filter" onchange="renderProjects()">
            <option value="">All Statuses</option>
            <option>Active</option><option>Done</option><option>Frogged</option>
          </select>
        </div>
        <div class="grid" id="proj-grid"></div>
      </div>
    </div>

    <!-- Screen: Pattern library -->
    <div class="screen off-right" id="s-library">
      <div class="app-header">
        <div class="app-header-side">
          <button class="sb-avatar-btn" onclick="sbShowProfileSheet()" aria-label="Profile & settings">
            <span class="sb-avatar-initials">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </span>
            <span class="sb-avatar-dot"></span>
          </button>
        </div>
        <img src="CC-logo.png" alt="Crochet Corner" class="app-header-logo"/>
        <div class="app-header-side">
          <button class="btn-header-add" onclick="openNewPattern()" title="Add pattern">
            <svg viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
          </button>
        </div>
      </div>
      <div class="list-pad">
        <div style="padding:0.75rem 0 0.25rem">
          <span class="count-lbl" id="lib-count-lbl">0 patterns</span>
        </div>
        <div class="filters">
          <input type="text" id="lib-search" placeholder="Search…" oninput="renderLibrary()"/>
          <select id="lib-cat-filter" onchange="renderLibrary()">
            <option value="">All categories</option>
            <option>Amigurumi</option><option>Blanket</option><option>Hat</option>
            <option>Shawl</option><option>Bag</option><option>Clothing</option>
            <option>Home decor</option><option>Other</option>
          </select>
        </div>
        <div class="grid" id="lib-grid"></div>
      </div>
    </div>

    <!-- Screen: Detail (project or pattern) -->
    <div class="screen off-right" id="s-detail">
      <div class="top-bar">
        <button class="btn-back" onclick="goBack()">
          <img src="chevron-back.svg" alt="Back" class="back-chevron"/>
        </button>
        <span id="back-lbl" style="display:none"></span>
        <img src="CC-logo.png" alt="Crochet Corner" class="top-bar-logo"/>
        <button class="top-bar-action" id="d-edit-btn" style="display:none" onclick="triggerDetailEdit()" title="Edit">
          <svg viewBox="0 0 24 24"><line x1="18" y1="2" x2="22" y2="6"/><path d="M7.5 20.5 19 9l-4-4L3.5 16.5 2 22z"/></svg>
        </button>
      </div>
      <div id="d-content"></div>
    </div>

    <!-- Screen: Edit (project or pattern) -->
    <div class="screen off-right" id="s-edit">
      <div class="top-bar">
        <button class="btn-back" onclick="closeEditScreen()">
          <img src="chevron-back.svg" alt="Back" class="back-chevron"/>
        </button>
        <img src="CC-logo.png" alt="Crochet Corner" class="top-bar-logo"/>
        <button class="btn-header-trash" id="edit-delete-btn" style="display:none" onclick="triggerEditDelete()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
      <div id="edit-content" style="max-width:640px;margin:0 auto;padding:1.25rem 1rem 6rem"></div>
    </div>

  </div>
  <!-- Bottom tab bar - hidden on detail/edit screen -->
  <div class="tab-bar" id="main-tab-bar">
    <button class="tab-btn active" id="tab-projects" onclick="switchTab('projects')">

        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
      <div class="sb-profile-user-info">
        <div class="sb-profile-email" id="sb-profile-email-lbl">Not signed in</div>
        <div class="sb-profile-sync-lbl" id="sb-profile-sync-lbl">Sync disabled</div>
      </div>
    </div>

    <div class="sb-profile-divider"></div>

    <!-- Actions -->
    <button class="sb-profile-action" onclick="sbTriggerSync();sbHideProfileSheet()">
      <span class="sb-profile-action-icon">☁</span> Sync now
    </button>
    <button class="sb-profile-action" onclick="sbHideProfileSheet();showBackupSheet()">
      <span class="sb-profile-action-icon">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </span> Backup & restore
    </button>
    <button class="sb-profile-action" id="sb-change-pw-btn" onclick="sbHideProfileSheet();sbShowChangePw()">
      <span class="sb-profile-action-icon">🔑</span> Change password
    </button>
    <button class="sb-profile-action sb-profile-action-danger" id="sb-signout-btn" onclick="supabaseSignOut()">
      <span class="sb-profile-action-icon">↩</span> Sign out
    </button>

    <div class="sb-profile-divider"></div>
    <div class="sb-profile-version">Crochet Corner · Version 1.0</div>
  </div>
</div>

<!-- ── Sign-out loading overlay ─────────────────────────────────── -->
<div id="sb-signout-overlay" class="sb-signout-overlay" style="display:none" aria-live="polite" aria-busy="true">
  <div class="sb-signout-card" role="status">
    <div class="sb-signout-spinner" aria-hidden="true"></div>
    <div class="sb-signout-text">Signing you out…</div>
  </div>
</div>

<!-- ── Change password sheet ─────────────────────────────────────── -->
<div id="sb-changepw-scrim" class="sb-profile-scrim" style="display:none" onclick="sbHideChangePw()">
  <div class="sb-profile-sheet" onclick="event.stopPropagation()">
    <div class="sb-profile-handle"></div>
    <div class="sb-changepw-body">
      <h3 class="sb-sheet-title" style="padding:0 0 1rem">Change password</h3>
      <div class="sb-field">
        <input type="password" id="sb-new-pw" class="sb-auth-input" placeholder=" "/>
        <label class="sb-field-label" for="sb-new-pw">New password</label>
      </div>
      <div class="sb-field">
        <input type="password" id="sb-confirm-pw" class="sb-auth-input" placeholder=" "/>
        <label class="sb-field-label" for="sb-confirm-pw">Confirm new password</label>
      </div>
      <button class="sb-btn-primary" onclick="sbDoChangePw()">Save new password</button>
      <p id="sb-changepw-msg" class="sb-auth-msg"></p>
      <div style="text-align:center;margin-top:.75rem">
        <button class="sb-btn-skip" onclick="sbHideChangePw()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Auth overlay (Supabase sign-in) ─────────────────────────────── -->
<div id="sb-auth-overlay" class="sb-auth-overlay sb-hidden">
  <div class="sb-auth-card">

    <img src="CC-logo.png" alt="Crochet Corner" class="sb-auth-logo"/>

    <!-- Tab toggle -->
    <div class="sb-tabs">
      <button class="sb-tab active" id="sb-tab-in" onclick="sbSwitchTab('in')">Sign in</button>
      <button class="sb-tab"        id="sb-tab-up" onclick="sbSwitchTab('up')">Create account</button>
    </div>

    <div class="sb-field">
      <input type="email"    id="sb-email-input"    class="sb-auth-input" placeholder=" " autocomplete="email"/>
      <label class="sb-field-label" for="sb-email-input">Email</label>
    </div>
    <div class="sb-field">
      <input type="password" id="sb-password-input" class="sb-auth-input" placeholder=" " autocomplete="current-password"/>
      <label class="sb-field-label" for="sb-password-input">Password</label>
    </div>

    <button id="sb-submit-btn" class="sb-btn-primary" onclick="sbHandleAuthSubmit()">Sign in</button>
    <p id="sb-auth-msg" class="sb-auth-msg"></p>

    <div class="sb-auth-footer">
      <button class="sb-btn-skip" onclick="sbSkipAuth()">Continue without signing in</button>
    </div>

  </div>
</div>

<!-- ── Supabase styles ────────────────────────────────────────────── -->
<style>
/* Auth overlay */
.sb-auth-overlay{position:fixed;inset:0;background:rgba(20,5,40,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:1.25rem;}
.sb-hidden{display:none!important;}
.sb-auth-card{background:#fff;border-radius:2rem;padding:2rem 1.75rem 1.5rem;max-width:340px;width:100%;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.35);}
.sb-auth-logo{height:56px;margin-bottom:1.5rem;}
.sb-auth-desc{font-size:.85rem;color:#888;margin:0 0 1.25rem;line-height:1.55;}
/* Floating label field */
.sb-field{position:relative;margin-bottom:.85rem;text-align:left;}
.sb-auth-input{width:100%;padding:1.35rem 1rem .55rem;border:1.5px solid #ede5f8;border-radius:.875rem;font-size:.95rem;outline:none;box-sizing:border-box;background:#faf7ff;color:#2d1b4e;transition:border-color .2s,box-shadow .2s;}
.sb-auth-input:focus{border-color:#7B4FD8;box-shadow:0 0 0 3px rgba(123,79,216,.12);background:#fff;}
.sb-field-label{position:absolute;left:1rem;top:50%;transform:translateY(-50%);font-size:.95rem;color:#b0a0c8;pointer-events:none;transition:top .18s ease,font-size .18s ease,color .18s ease,transform .18s ease;}
.sb-auth-input:focus ~ .sb-field-label,
.sb-auth-input:not(:placeholder-shown) ~ .sb-field-label{top:.55rem;transform:translateY(0);font-size:.68rem;font-weight:600;color:#7B4FD8;letter-spacing:.03em;text-transform:uppercase;}
.sb-btn-primary{width:100%;padding:.9rem;background:linear-gradient(135deg,#7B4FD8,#a070e8);color:#fff;border:none;border-radius:.875rem;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.25rem;margin-bottom:.5rem;transition:opacity .2s,transform .1s;box-shadow:0 4px 16px rgba(123,79,216,.35);}
.sb-btn-primary:hover{opacity:.92;}
.sb-btn-primary:active{transform:scale(.98);}
.sb-btn-primary:disabled{background:#ccc;box-shadow:none;cursor:default;}
.sb-auth-msg{font-size:.82rem;min-height:1.1em;margin:.25rem 0 .25rem;line-height:1.4;}
.sb-auth-footer{margin-top:.75rem;padding-top:.75rem;border-top:1px solid #f0eaf8;}
.sb-btn-skip{background:none;border:none;color:#bbb;font-size:.8rem;cursor:pointer;padding:0;}
.sb-btn-skip:hover{color:#888;}
/* Cloud sync button in header */
.sb-sync-btn{background:none;border:none;font-size:1.15rem;color:#bbb;cursor:pointer;padding:.2rem .3rem;line-height:1;transition:color .2s;}
.sb-sync-btn:hover{color:#7B4FD8;}
.sb-sync-btn.synced{color:#2a9d5c;}
.sb-sync-btn.error{color:#e05;}
/* Avatar button */
.sb-avatar-btn{position:relative;background:none;border:none;padding:0;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.sb-avatar-initials{width:34px;height:34px;border-radius:50%;background:#e8d5f5;color:#7B4FD8;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;line-height:1;}
.sb-avatar-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:#ccc;border:2px solid #fff;transition:background .3s;}
.sb-avatar-dot.synced{background:#2a9d5c;}
.sb-avatar-dot.syncing{background:#f4a020;animation:sb-pulse 1s infinite;}
.sb-avatar-dot.error{background:#e05050;}
@keyframes sb-pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Profile sheet */
.sb-profile-scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;display:flex;align-items:flex-end;}
.sb-profile-sheet{background:#fff;border-radius:1.5rem 1.5rem 0 0;padding:0 0 2rem;width:100%;max-width:480px;margin:0 auto;animation:sb-slide-up .25s ease;}
@keyframes sb-slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sb-profile-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 16px;}
.sb-profile-user{display:flex;align-items:center;gap:.9rem;padding:0 1.25rem 1rem;}
.sb-profile-avatar-large{width:48px;height:48px;border-radius:50%;background:#e8d5f5;color:#7B4FD8;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:700;flex-shrink:0;}
.sb-profile-email{font-size:.9rem;font-weight:600;color:#2d1b4e;}
.sb-profile-sync-lbl{font-size:.78rem;color:#888;margin-top:.15rem;}
.sb-profile-divider{height:1px;background:#f0f0f0;margin:.25rem 0;}
.sb-profile-action{display:flex;align-items:center;gap:.75rem;width:100%;padding:.85rem 1.25rem;background:none;border:none;font-size:.95rem;color:#2d1b4e;cursor:pointer;text-align:left;transition:background .15s;}
.sb-profile-action:hover{background:#f7f4fc;}
.sb-profile-action-icon{width:20px;text-align:center;font-size:1rem;color:#7B4FD8;}
.sb-profile-action-danger{color:#e05050;}
.sb-profile-action-danger .sb-profile-action-icon{color:#e05050;}
.sb-profile-version{text-align:center;font-size:.75rem;color:#bbb;padding:.75rem 1.25rem 0;}
/* Sign-out loading overlay */
.sb-signout-overlay{position:fixed;inset:0;background:rgba(20,5,40,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:3000;display:flex;align-items:center;justify-content:center;animation:sb-fade-in .2s ease;}
.sb-signout-card{background:#fff;border-radius:1rem;padding:1.5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:.85rem;box-shadow:0 6px 24px rgba(0,0,0,.18);min-width:180px;}
.sb-signout-spinner{width:32px;height:32px;border:3px solid #e8d5f5;border-top-color:#7B4FD8;border-radius:50%;animation:sb-spin .8s linear infinite;}
.sb-signout-text{font-size:.92rem;color:#333;font-weight:500;letter-spacing:.01em;}
@keyframes sb-spin{to{transform:rotate(360deg);}}
@keyframes sb-fade-in{from{opacity:0;}to{opacity:1;}}
.sb-sheet-title{font-size:1.05rem;font-weight:700;color:#2d1b4e;margin:0 0 1rem;padding:0 1.25rem;}
.sb-changepw-body{padding:0 1.25rem 1rem;}
/* Auth tabs */
.sb-tabs{display:flex;border-radius:.6rem;overflow:hidden;border:2px solid #e2d4f0;margin-bottom:1rem;}
.sb-tab{flex:1;padding:.55rem;background:none;border:none;font-size:.875rem;font-weight:600;color:#888;cursor:pointer;transition:background .15s,color .15s;}
.sb-tab.active{background:#7B4FD8;color:#fff;}
/* Magic link row */
.sb-magic-link-row{margin:.3rem 0 .6rem;text-align:center;}
.sb-btn-text{background:none;border:none;color:#7B4FD8;font-size:.82rem;cursor:pointer;text-decoration:underline;padding:0;}
/* Signed-in user chip */
.sb-user-chip{font-size:.7rem;color:#888;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;cursor:pointer;display:none;}
</style>

<!-- ── Supabase JS SDK ─────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="supabase-sync.js"></script>
<script src="app.js"></script>
</body>
</html>
